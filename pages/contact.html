<!DOCTYPE html>
<html>
<head>
    <title>Annapurna Hub</title>
    <link rel="stylesheet" href="./../css/contact.css"/>
</head>
<body>
   <div>
    <div class="navbar"></div>
    
     <div>
        <span>Get In Touch</span>
        <p>We are here to hear you! Whether you have a question about services, pricing, or anything else, our team is ready to answer all your questions. </p>
     </div><hr/>
     <!-- Location -->
      <hr/>
    <!-- Send a message -->
    <div class="message-container">
    <span class="message-heading">Send us a Message</span>
    <div class="message-section">
    <form>
        <label for="username" class="label-text">Full Name</label><br/>
        <input type="text" id="username" placeholder="Enter your name" class="enter-text"/><br/>
        <label for="useremail" class="label-text">Email Address</label><br/>
        <input type="email" id="useremail" placeholder="Enter your email" class="enter-text"/><br/>
        <label for="userphone" class="label-text">Phone Number</label><br/>
        <input type="tel" id="userphone" placeholder="Enter your phone number" class="enter-text"/><br/>
        <div>
            <span>General Inquiry</span>
            <span>Support</span>
            <span>Bussiness Collaboration</span>
            <span>Feedback</span>
        </div><br/>
        <label for="usermessage" class="label-text">Message us</label><br/>
        <textarea id="usermessage"class="enter-text" placeholder="Write your message here......."></textarea><br/>
        <button class="message-btn">Send Message</button>
    </form>
    </div>
    </div>

   </div> 
</body>
</html>
